{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <div class="card-header">
        <div class="card-title">
            <i class="fas fa-edit text-success"></i> 
            {% if obj %}Sửa thông tin khách hàng: {{ obj.ma_kh }}{% else %}Thêm mới khách hàng/Gara{% endif %}
        </div>
        <a href="{% url 'kh_list' %}" class="btn btn-secondary btn-sm"><i class="fas fa-arrow-left"></i> Quay lại</a>
    </div>

    <form method="post" class="card-body">
        {% csrf_token %}
        <div class="form-row">
            <div class="col col-4 form-group">
                <label class="form-label">Mã KH <span class="text-danger">*</span></label>
                <input type="text" name="ma_kh" class="form-control" value="{{ obj.ma_kh }}" required autofocus>
            </div>
            <div class="col col-8 form-group">
                <label class="form-label">Tên khách hàng / Tên Gara <span class="text-danger">*</span></label>
                <input type="text" name="ten_kh" class="form-control" value="{{ obj.ten_kh }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="col col-4 form-group">
                <label class="form-label">Loại khách hàng <span class="text-danger">*</span></label>
                <select name="loai_kh" class="form-control" required>
                    <option value="ca_nhan" {% if obj.loai_kh == 'ca_nhan' %}selected{% endif %}>Cá nhân</option>
                    <option value="gara" {% if obj.loai_kh == 'gara' %}selected{% endif %}>Gara / Xưởng mảng</option>
                    <option value="doanh_nghiep" {% if obj.loai_kh == 'doanh_nghiep' %}selected{% endif %}>Doanh nghiệp / Đại lý</option>
                </select>
            </div>
            <div class="col col-4 form-group">
                <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                <input type="text" name="so_dien_thoai" class="form-control" value="{{ obj.so_dien_thoai }}" required>
            </div>
            <div class="col col-4 form-group">
                <label class="form-label">Mã số thuế</label>
                <input type="text" name="ma_so_thue" class="form-control" value="{{ obj.ma_so_thue }}">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Địa chỉ</label>
            <input type="text" name="dia_chi" class="form-control" value="{{ obj.dia_chi }}">
        </div>

        <div class="form-row mt-4">
            <div class="col col-6 form-group">
                <label class="form-label">Hạn mức nợ cho phép (VNĐ)</label>
                <input type="number" name="han_muc_cong_no" class="form-control" value="{{ obj.han_muc_cong_no|default:'0' }}" min="0">
                <small class="text-muted">Nhập 0 nếu không cho nợ</small>
            </div>
            <div class="col col-6 form-group">
                <label class="form-label">Chiết khấu mặc định (%)</label>
                <input type="number" name="chiet_khau_mac_dinh" class="form-control" value="{{ obj.chiet_khau_mac_dinh|default:'0' }}" step="0.1" min="0" max="100">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Ghi chú</label>
            <textarea name="ghi_chu" class="form-control" rows="2">{{ obj.ghi_chu }}</textarea>
        </div>

        <div class="mt-4 pt-3 text-right" style="border-top: 1px solid rgba(0,0,0,0.05);">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu thông tin</button>
        </div>
    </form>
</div>
{% endblock %}
