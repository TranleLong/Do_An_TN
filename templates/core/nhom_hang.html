{% extends 'base.html' %}

{% block content %}
<div class="card" style="margin-bottom:16px;">
    <div class="card-header">
        <div class="card-title">Thêm nhóm hàng</div>
    </div>
    <div class="card-body">
        <form method="post" class="form-row">
            {% csrf_token %}
            <div class="col">
                <label>Mã nhóm</label>
                <input type="text" name="ma_nhom" class="form-control" required>
            </div>
            <div class="col">
                <label>Tên nhóm</label>
                <input type="text" name="ten_nhom" class="form-control" required>
            </div>
            <div class="col" style="display:flex;align-items:end;">
                <button type="submit" class="btn btn-primary">Thêm</button>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <div class="card-title">Danh sách nhóm hàng</div>
    </div>
    <div class="table-responsive">
        <table class="table">
            <thead>
                <tr>
                    <th>Mã nhóm</th>
                    <th>Tên nhóm</th>
                    <th>Mô tả</th>
                </tr>
            </thead>
            <tbody>
                {% for item in items %}
                <tr>
                    <td>{{ item.ma_nhom }}</td>
                    <td>{{ item.ten_nhom }}</td>
                    <td>{{ item.mo_ta }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center text-muted">Chưa có nhóm hàng.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
